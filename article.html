<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>News Article</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4">

  <div class="max-w-4xl mx-auto bg-white rounded-lg shadow p-4">
    <iframe id="docFrame" class="w-full h-[80vh] rounded"></iframe>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const docUrl = params.get("doc");

    if (docUrl) {
      // Convert to EMBED view
      let embedUrl = docUrl.replace("/edit", "/preview");

      document.getElementById("docFrame").src = embedUrl;
    } else {
      document.body.innerHTML = "<p class='text-center text-red-500'>No article found.</p>";
    }
  </script>

</body>
</html>
