<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Article</title>

<!-- Favicon you want -->
<link rel="icon" href="/path/to/your/favicon.ico" type="image/x-icon" />

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet" />

<style>
  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f9fafb;
    color: #222;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  main {
    flex-grow: 1;
    max-width: 800px;
    margin: 1rem auto;
    padding: 0 1rem;
  }

  #back-to-news {
    display: block;
    max-width: 200px;
    margin: 1.5rem auto;
    padding: 0.75rem 1.5rem;
    background-color: #16a085;
    color: white;
    text-align: center;
    font-weight: 600;
    border-radius: 6px;
    text-decoration: none;
    box-shadow: 0 4px 6px rgb(0 0 0 / 0.1);
    transition: background-color 0.3s ease;
  }

  #back-to-news:hover {
    background-color: #13876f;
  }

  #doc-container {
    background: white;
    box-shadow: 0 2px 8px rgb(0 0 0 / 0.1);
    padding: 1.5rem;
    border-radius: 8px;
    overflow-x: auto;
  }

  /* No global hiding of headings! We will remove only from fetched content */
</style>
</head>
<body>

<a id="back-to-news" href="https://sites.google.com/view/f9-racing-official-website/news" rel="noopener noreferrer">Back to News</a>

<main>
  <div id="doc-container"></div>
</main>

<script>
  const params = new URLSearchParams(window.location.search);
  const docUrl = params.get("doc");
  const container = document.getElementById("doc-container");

  if (!docUrl) {
    container.innerHTML = "<p style='color: red; text-align:center;'>No article found.</p>";
  } else {
    fetch(docUrl)
      .then(response => {
        if (!response.ok) throw new Error("Failed to load document.");
        return response.text();
      })
      .then(htmlText => {
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlText, "text/html");

        // Google Docs published docs wrap content inside div#contents or div#doc-contents or <body>
        // Find main content container heuristically:
        let contentContainer = doc.querySelector('#contents') || doc.querySelector('#doc-contents') || doc.body;

        if (!contentContainer) {
          throw new Error("Could not find main content in the published document.");
        }

        // Clone the container to manipulate it without affecting the parsed doc
        const cleanContent = contentContainer.cloneNode(true);

        // Remove the blue "Published using Google Docs" banner — it usually has role="banner" or class names
        const banners = cleanContent.querySelectorAll('div[role="banner"], .ndfHFb-c4YZDc-Wrql6b, .kIXpAf');
        banners.forEach(el => el.remove());

        // Remove unwanted footer texts (including "Updated automatically every 5 minutes")
        cleanContent.querySelectorAll('p, span, div').forEach(el => {
          const text = el.textContent?.toLowerCase() || '';
          if (
            text.includes('published using google docs') ||
            text.includes('updated automatically every') ||
            text.includes('report abuse') ||
            text.includes('learn more')
          ) {
            el.remove();
          }
        });

        // Remove headings that are unwanted titles like your S14R10_Report (usually inside h1, h2, etc)
        cleanContent.querySelectorAll('h1, h2, h3, h4, h5, h6').forEach(el => {
          // You can customize this to keep some headings if needed
          el.remove();
        });

        // Inject the cleaned content into your page container
        container.innerHTML = "";
        container.appendChild(cleanContent);

      })
      .catch(err => {
        container.innerHTML = `<p style="color: red; text-align:center;">${err.message}</p>`;
      });
  }
</script>

</body>
</html>
