<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article</title>

  <link rel="icon" href="https://lh3.googleusercontent.com/d/1GFKnYSgrZVqhVp8ZMqyG5II0nLk_HIPM">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
    }

    #news-button {
      display: block;
      width: 200px;
      padding: 12px;
      margin: 20px auto;
      background-color: #1abc9c;
      color: white;
      text-align: center;
      border-radius: 5px;
      text-decoration: none;
    }

    #content {
      max-width: 800px;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
    }

    /* 🔥 THIS fixes your issue */
    #content img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 10px auto;
    }

    #error {
      display: none;
      text-align: center;
      color: red;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<a id="news-button"
   href="https://sites.google.com/view/f9-racing-official-website/news"
   target="_blank">
   News
</a>

<div id="content">Loading article...</div>
<div id="error">No article found.</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const docUrl = params.get("doc");

  const contentDiv = document.getElementById("content");
  const errorDiv = document.getElementById("error");

  if (!docUrl) {
    contentDiv.style.display = "none";
    errorDiv.style.display = "block";
  } else {
    // Fetch the published Google Doc HTML
    fetch(docUrl)
      .then(res => res.text())
      .then(html => {
        // Extract body content
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");

        const article = doc.querySelector("body");

        contentDiv.innerHTML = article.innerHTML;
      })
      .catch(() => {
        contentDiv.style.display = "none";
        errorDiv.style.display = "block";
      });
  }
</script>

</body>
</html>
