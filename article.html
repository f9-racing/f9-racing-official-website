<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #f3f4f6;
    }

    /* Fullscreen container */
    #frame {
      width: 100%;
      height: 100vh;
      border: none;
    }

    /* Fallback message */
    #error {
      display: none;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
      color: red;
    }
  </style>
</head>

<body>

  <iframe id="frame"></iframe>
  <div id="error">No article found.</div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const docUrl = params.get("doc");

    const frame = document.getElementById("frame");
    const error = document.getElementById("error");

    if (!docUrl) {
      frame.style.display = "none";
      error.style.display = "block";
    } else {
      // Convert Google Docs link to FULL-FORMAT preview mode
      let cleanUrl = docUrl
        .replace("/edit", "/preview")
        .replace("/view", "/preview");

      frame.src = cleanUrl;
    }
  </script>

</body>
</html>
