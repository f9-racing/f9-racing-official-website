<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Article</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4">

  <div id="content" class="max-w-3xl mx-auto bg-white p-6 rounded shadow">
    Loading article...
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const docUrl = params.get("doc");

    async function loadDoc() {
      if (!docUrl) {
        document.getElementById("content").innerHTML = "No article found.";
        return;
      }

      const exportUrl = docUrl.replace("/edit", "/export?format=html");

      try {
        const res = await fetch(exportUrl);
        const html = await res.text();

        // Extract body content only
        const bodyContent = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);

        document.getElementById("content").innerHTML =
          bodyContent ? bodyContent[1] : html;

      } catch (err) {
        document.getElementById("content").innerHTML =
          "Failed to load article.";
      }
    }

    loadDoc();
  </script>

</body>
</html>
