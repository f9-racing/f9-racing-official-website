<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Article</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet" />

<style>
  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f9fafb;
    color: #222;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  main {
    flex-grow: 1;
    max-width: 800px;
    margin: 1rem auto;
    padding: 0 1rem;
  }

  #back-to-news {
    display: block;
    max-width: 200px;
    margin: 1.5rem auto;
    padding: 0.75rem 1.5rem;
    background-color: #16a085;
    color: white;
    text-align: center;
    font-weight: 600;
    border-radius: 6px;
    text-decoration: none;
    box-shadow: 0 4px 6px rgb(0 0 0 / 0.1);
    transition: background-color 0.3s ease;
  }

  #back-to-news:hover {
    background-color: #13876f;
  }

  #doc-container {
    background: white;
    box-shadow: 0 2px 8px rgb(0 0 0 / 0.1);
    padding: 1.5rem;
    border-radius: 8px;
    overflow-x: auto;
  }

  /* Hide Google Docs banner and unwanted headings */
  div[role="banner"],
  h1, h2, h3, h4, h5, h6,
  /* Also hide the footer texts from Google Docs publish */
  p, span {
    display: none !important;
  }
  
  /* But we want to keep Back to News and main container visible */
  #back-to-news,
  #doc-container {
    display: block !important;
  }

  /* Ensure images inside doc scale properly */
  #doc-container img {
    max-width: 100%;
    height: auto;
  }
</style>
</head>
<body>

<a id="back-to-news" href="https://sites.google.com/view/f9-racing-official-website/news" rel="noopener noreferrer">Back to News</a>

<main>
  <div id="doc-container"></div>
</main>

<script>
  const params = new URLSearchParams(window.location.search);
  let docUrl = params.get("doc");

  const container = document.getElementById("doc-container");

  if (!docUrl) {
    container.innerHTML = "<p style='color: red; text-align:center;'>No article found.</p>";
  } else {
    // Use the published Google Docs URL as is, no /pub?embedded=false because that adds banner
    // We'll fetch the published HTML and inject only the content inside the body, excluding banners

    fetch(docUrl)
      .then(response => {
        if (!response.ok) throw new Error("Failed to load document.");
        return response.text();
      })
      .then(htmlText => {
        // Parse the fetched HTML
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlText, "text/html");

        // Remove Google Docs banner by role="banner"
        const banner = doc.querySelector('div[role="banner"]');
        if (banner) banner.remove();

        // Remove unwanted headings (h1-h6)
        doc.querySelectorAll("h1, h2, h3, h4, h5, h6").forEach(el => el.remove());

        // Remove footer update text by checking for known text pattern
        doc.querySelectorAll("p, span").forEach(el => {
          if (/updated automatically/i.test(el.textContent) || /published using google docs/i.test(el.textContent)) {
            el.remove();
          }
        });

        // Grab the main content container - usually inside <body>
        // Some published docs wrap content in <div id="contents"> or <body> directly
        // Let's take all body children except scripts and styles
        const bodyChildren = Array.from(doc.body.children).filter(
          el => el.tagName.toLowerCase() !== "script" && el.tagName.toLowerCase() !== "style"
        );

        // Clear our container first
        container.innerHTML = "";

        // Append those elements to our container
        bodyChildren.forEach(el => {
          container.appendChild(el.cloneNode(true));
        });

      })
      .catch(err => {
        container.innerHTML = `<p style="color: red; text-align:center;">${err.message}</p>`;
      });
  }
</script>

</body>
</html>
