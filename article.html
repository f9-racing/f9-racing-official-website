<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article</title>
  
  <!-- Favicon -->
  <link rel="icon" href="https://lh3.googleusercontent.com/d/1GFKnYSgrZVqhVp8ZMqyG5II0nLk_HIPM" type="image/png">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #f3f4f6;
      font-family: Arial, sans-serif;
    }

    /* Fullscreen container for the Google Docs embedded content */
    #frame {
      width: 100%;
      height: 100vh;
      border: none;
    }

    /* News Button */
    #news-button {
      display: block;
      width: 200px;
      padding: 12px;
      margin: 20px auto;
      background-color: #1abc9c; /* Turquoise color */
      color: white;
      font-size: 16px;
      text-align: center;
      text-decoration: none;
      border-radius: 5px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      cursor: pointer;
      transition: background-color 0.3s ease;
      position: fixed; /* Fixed position at the top */
      top: 20px; /* Slight margin from the top */
      left: 50%; /* Center horizontally */
      transform: translateX(-50%); /* Adjust to center */
      z-index: 1000; /* Ensure it's above the iframe */
    }

    #news-button:hover {
      background-color: #16a085; /* Darker turquoise on hover */
    }

    /* Fallback message for missing article */
    #error {
      display: none;
      text-align: center;
      padding: 40px;
      color: red;
    }
  </style>
</head>

<body>

  <!-- News Button -->
  <a id="news-button" href="https://sites.google.com/view/f9-racing-official-website/news" target="_blank">News</a>

  <!-- Embed the Google Docs in continuous scroll (HTML version) -->
  <iframe id="frame"></iframe>
  
  <div id="error">No article found.</div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const docUrl = params.get("doc");

    const frame = document.getElementById("frame");
    const error = document.getElementById("error");

    if (!docUrl) {
      frame.style.display = "none";
      error.style.display = "block";
    } else {
      // Convert Google Docs link to the embed version for continuous scroll
      let cleanUrl = docUrl.replace("/edit", "/pub");
      frame.src = cleanUrl + "?embedded=true";
    }
  </script>

</body>
</html>
